<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1180" viewBox="0 0 1800 1180">
<defs><style>text{font-family:Arial,'PingFang SC','Microsoft YaHei',sans-serif;fill:#243447}.title{font-size:34px;font-weight:700}.h{font-size:21px;font-weight:700}.t{font-size:18px}.s{font-size:15px;fill:#5d6b78}.box{stroke:#8ea0ae;stroke-width:2;rx:14}.a{stroke:#607586;stroke-width:3;fill:none;marker-end:url(#m)}</style><marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L9,3 L0,6Z" fill="#607586"/></marker></defs>
<rect width="1800" height="1180" fill="#f7f9fb"/><text x="65" y="62" class="title">AI 私教核心业务流程图</text><text x="65" y="94" class="s">从首次体测、首训，到日常训练、复测和计划迭代的完整服务闭环</text>
<rect x="55" y="130" width="1690" height="155" fill="#e8f2fb" class="box"/><text x="85" y="166" class="h">阶段一：体测与转化</text><g class="t"><rect x="90" y="195" width="220" height="55" fill="#fff" class="box"/><text x="137" y="230">到店扫码</text><rect x="350" y="195" width="220" height="55" fill="#fff" class="box"/><text x="397" y="230">绑定设备</text><rect x="610" y="195" width="220" height="55" fill="#fff" class="box"/><text x="650" y="230">完成体测</text><rect x="870" y="195" width="220" height="55" fill="#fff" class="box"/><text x="910" y="230">数据校验</text><rect x="1130" y="195" width="220" height="55" fill="#fff" class="box"/><text x="1162" y="230">报告解读</text><rect x="1390" y="195" width="260" height="55" fill="#fff" class="box"/><text x="1430" y="230">订阅/解锁</text></g><path d="M310 222H350M570 222H610M830 222H870M1090 222H1130M1350 222H1390" class="a"/>
<rect x="55" y="330" width="1690" height="165" fill="#edf7f0" class="box"/><text x="85" y="366" class="h">阶段二：目标与计划</text><g class="t"><rect x="100" y="400" width="260" height="55" fill="#fff" class="box"/><text x="155" y="435">目标问卷</text><rect x="420" y="400" width="260" height="55" fill="#fff" class="box"/><text x="463" y="435">读取器械与安全约束</text><rect x="740" y="400" width="260" height="55" fill="#fff" class="box"/><text x="803" y="435">生成4周计划</text><rect x="1060" y="400" width="260" height="55" fill="#fff" class="box"/><text x="1120" y="435">用户确认</text><rect x="1380" y="400" width="260" height="55" fill="#fff" class="box"/><text x="1440" y="435">进入首训</text></g><path d="M360 427H420M680 427H740M1000 427H1060M1320 427H1380" class="a"/>
<rect x="55" y="540" width="1690" height="220" fill="#fff7e7" class="box"/><text x="85" y="576" class="h">阶段三：日常训练闭环</text><g class="t"><rect x="90" y="615" width="220" height="60" fill="#fff" class="box"/><text x="138" y="650">训练提醒</text><rect x="350" y="615" width="220" height="60" fill="#fff" class="box"/><text x="396" y="650">读取今日计划</text><rect x="610" y="615" width="220" height="60" fill="#fff" class="box"/><text x="650" y="650">开始训练</text><rect x="870" y="615" width="220" height="60" fill="#fff" class="box"/><text x="920" y="650">记录执行</text><rect x="1130" y="615" width="220" height="60" fill="#fff" class="box"/><text x="1180" y="650">反馈/RPE</text><rect x="1390" y="615" width="260" height="60" fill="#fff" class="box"/><text x="1435" y="650">打卡与计划调整</text></g><path d="M310 645H350M570 645H610M830 645H870M1090 645H1130M1350 645H1390" class="a"/><text x="145" y="720" class="s">异常分支：疼痛 → 安全降级 → 替换动作/建议专业评估</text>
<rect x="55" y="805" width="1690" height="170" fill="#f2eefb" class="box"/><text x="85" y="841" class="h">阶段四：复测与迭代</text><g class="t"><rect x="120" y="875" width="280" height="55" fill="#fff" class="box"/><text x="190" y="910">28天复测提醒</text><rect x="480" y="875" width="280" height="55" fill="#fff" class="box"/><text x="550" y="910">复测与趋势对比</text><rect x="840" y="875" width="280" height="55" fill="#fff" class="box"/><text x="910" y="910">阶段成果报告</text><rect x="1200" y="875" width="280" height="55" fill="#fff" class="box"/><text x="1260" y="910">下一周期计划</text><rect x="1560" y="875" width="120" height="55" fill="#fff" class="box"/><text x="1590" y="910">再训练</text></g><path d="M400 902H480M760 902H840M1120 902H1200M1480 902H1560" class="a"/><path d="M1620 930V1040H200V760" class="a"/><text x="80" y="1050" class="s">长期闭环：测 → 练 → 记 → 调 → 再测</text>
</svg>
