<svg xmlns="http://www.w3.org/2000/svg" width="2000" height="1450" viewBox="0 0 2000 1450">
<defs><style>text{font-family:Arial,'PingFang SC','Microsoft YaHei',sans-serif;fill:#243447}.title{font-size:34px;font-weight:700}.h{font-size:21px;font-weight:700}.t{font-size:17px}.s{font-size:14px;fill:#5d6b78}.box{stroke:#8ea0ae;stroke-width:2;rx:13}.a{stroke:#607586;stroke-width:3;fill:none;marker-end:url(#m)}.d{stroke:#a06b4b;stroke-width:2;fill:none;stroke-dasharray:8 7;marker-end:url(#m2)}</style><marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L9,3 L0,6Z" fill="#607586"/></marker><marker id="m2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L9,3 L0,6Z" fill="#a06b4b"/></marker></defs>
<rect width="2000" height="1450" fill="#f7f9fb"/><text x="65" y="62" class="title">AI 私教 Agent 内部处理链路（详细）</text><text x="65" y="94" class="s">示例输入：“我不想练腿，换一个”｜重点展示意图、记忆、规则、工具、确认和写回</text>
<rect x="60" y="130" width="1880" height="115" fill="#e8f2fb" class="box"/><text x="95" y="167" class="h">0. 用户输入与会话接入</text><rect x="100" y="185" width="310" height="40" fill="#fff" class="box"/><text x="142" y="211" class="t">用户消息 / 语音 / 训练事件</text><rect x="470" y="185" width="310" height="40" fill="#fff" class="box"/><text x="540" y="211" class="t">身份、门店、订阅鉴权</text><rect x="840" y="185" width="310" height="40" fill="#fff" class="box"/><text x="900" y="211" class="t">会话状态加载</text><path d="M410 205H470M780 205H840" class="a"/>
<rect x="60" y="280" width="1880" height="190" fill="#edf7f0" class="box"/><text x="95" y="317" class="h">1. 意图理解与实体抽取</text><rect x="100" y="345" width="360" height="85" fill="#fff" class="box"/><text x="175" y="378" class="t">Intent Router</text><text x="135" y="405" class="s">adjust_plan / feedback_feeling</text><rect x="520" y="345" width="360" height="85" fill="#fff" class="box"/><text x="610" y="378" class="t">实体与动作抽取</text><text x="585" y="405" class="s">target=lower_body, action=replace</text><rect x="940" y="345" width="360" height="85" fill="#fff" class="box"/><text x="1035" y="378" class="t">置信度与澄清判断</text><text x="1025" y="405" class="s">是否需要确认“抗拒还是疼痛”</text><rect x="1360" y="345" width="450" height="85" fill="#fff" class="box"/><text x="1455" y="378" class="t">任务对象生成</text><text x="1415" y="405" class="s">调整当前训练日，不默认改整周期</text><path d="M460 387H520M880 387H940M1300 387H1360" class="a"/>
<rect x="60" y="505" width="1880" height="245" fill="#fff7e7" class="box"/><text x="95" y="542" class="h">2. Context Builder：按意图读取上下文</text><g class="t"><rect x="100" y="575" width="300" height="70" fill="#fff" class="box"/><text x="165" y="605">当前计划版本</text><text x="145" y="630" class="s">当天动作/剩余周期</text><rect x="440" y="575" width="300" height="70" fill="#fff" class="box"/><text x="510" y="605">执行场景记忆</text><text x="475" y="630" class="s">近期跳过/太累/RPE</text><rect x="780" y="575" width="300" height="70" fill="#fff" class="box"/><text x="850" y="605">用户偏好</text><text x="815" y="630" class="s">动作喜好/沟通方式</text><rect x="1120" y="575" width="300" height="70" fill="#fff" class="box"/><text x="1190" y="605">安全状态</text><text x="1150" y="630" class="s">膝腰疼痛/禁忌动作</text><rect x="1460" y="575" width="350" height="70" fill="#fff" class="box"/><text x="1540" y="605">门店动作与器械</text><text x="1500" y="630" class="s">可用器械/替代关系</text></g><rect x="100" y="675" width="980" height="42" fill="#fff" class="box"/><text x="145" y="702" class="t">上下文优先级：安全约束 ＞ 当前计划 ＞ 用户明确目标 ＞ 执行反馈 ＞ 长期偏好</text><path d="M1080 596H1120" class="d"/>
<rect x="60" y="785" width="1880" height="205" fill="#f2eefb" class="box"/><text x="95" y="822" class="h">3. 规则与工具决策</text><rect x="100" y="855" width="360" height="80" fill="#fff" class="box"/><text x="180" y="888" class="t">安全规则引擎</text><text x="145" y="915" class="s">有疼痛？立即禁用相关动作</text><rect x="520" y="855" width="360" height="80" fill="#fff" class="box"/><text x="610" y="888" class="t">计划调整规则</text><text x="580" y="915" class="s">临时替换/局部调整/新版本</text><rect x="940" y="855" width="360" height="80" fill="#fff" class="box"/><text x="1040" y="888" class="t">动作替代查询</text><text x="1010" y="915" class="s">器械、肌群、难度、禁忌过滤</text><rect x="1360" y="855" width="450" height="80" fill="#fff" class="box"/><text x="1475" y="888" class="t">用户确认策略</text><text x="1410" y="915" class="s">长期计划变更必须确认</text><path d="M460 895H520M880 895H940M1300 895H1360" class="a"/>
<rect x="60" y="1025" width="1880" height="180" fill="#e8f2fb" class="box"/><text x="95" y="1062" class="h">4. 生成、校验与交互</text><rect x="100" y="1095" width="340" height="70" fill="#fff" class="box"/><text x="180" y="1125" class="t">LLM 生成方案</text><text x="145" y="1150" class="s">澄清/解释/替换建议</text><rect x="500" y="1095" width="340" height="70" fill="#fff" class="box"/><text x="600" y="1125" class="t">JSON Schema</text><text x="575" y="1150" class="s">动作、原因、风险、下一步</text><rect x="900" y="1095" width="340" height="70" fill="#fff" class="box"/><text x="975" y="1125" class="t">Safety Judge</text><text x="955" y="1150" class="s">越界检查/拒答/降级</text><rect x="1300" y="1095" width="340" height="70" fill="#fff" class="box"/><text x="1370" y="1125" class="t">用户确认</text><text x="1355" y="1150" class="s">确认后才改变计划</text><rect x="1700" y="1095" width="160" height="70" fill="#fff" class="box"/><text x="1732" y="1138" class="t">展示</text><path d="M440 1130H500M840 1130H900M1240 1130H1300M1640 1130H1700" class="a"/>
<rect x="60" y="1240" width="1880" height="145" fill="#fff7e7" class="box"/><text x="95" y="1277" class="h">5. 事件写回与异步记忆更新</text><rect x="100" y="1305" width="360" height="48" fill="#fff" class="box"/><text x="180" y="1335" class="t">保存临时约束/训练事件</text><rect x="540" y="1305" width="360" height="48" fill="#fff" class="box"/><text x="620" y="1335" class="t">Memory Writer 审核</text><rect x="980" y="1305" width="360" height="48" fill="#fff" class="box"/><text x="1055" y="1335" class="t">更新场景记忆/安全状态</text><rect x="1420" y="1305" width="430" height="48" fill="#fff" class="box"/><text x="1500" y="1335" class="t">记录来源、版本、审计与评测</text><path d="M460 1329H540M900 1329H980M1340 1329H1420" class="a"/><path d="M1800 1305V1205" class="d"/>
</svg>
